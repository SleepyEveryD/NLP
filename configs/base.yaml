# Base run configuration. The defaults every run inherits, these are.
# Override per experiment by copying this file or passing overrides.
run_id: "baseline"
seed: 13
latency_budget_s: 30.0          # The hard wall of the game, this is.
prompt_strategy: "zero_shot_v1"

mode: "live"                 # "offline" = our own dev-set test | "live" = the real game API.
dataset_path: "data/dev_questions.jsonl"   # The offline dev set -- read only when mode is offline.

game:                           # Live-game settings -- ignored when mode is offline, they are.
  competition_id: 0             # 0 Entertainment · 1 History · 2 Science · 3 Maths · 4 Philosophy · 5 News.
  game_mode: "text"             # "text" | "speech".
  aim_seconds: 25.0             # Answer-by target; the network margin below the 30s wall, this keeps.

model:
  name: "Qwen/Qwen2.5-7B-Instruct"
  quantization: "4bit"          # bitsandbytes nf4, on a Colab T4 it fits.
  max_new_tokens: 256
  temperature: 0.0              # Greedy -- deterministic and fast, we stay.
  dtype: "bfloat16"

retrieval:
  enabled: true                # Off for the baseline -- Phase 4 turns it on.
  top_k: 3
  embedder: "intfloat/multilingual-e5-small"
  index_path: null
